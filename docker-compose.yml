name: album-fotos

services:
  postgres:
    image: postgres:15-alpine
    container_name: album-fotos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: album_fotos
    volumes:
      # Volumen nombrado para persistencia de datos
      - postgres_data:/var/lib/postgresql/data
      # Carpeta de backups (opcional)
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - album-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: album-fotos-app:latest
    container_name: album-fotos-app
    restart: unless-stopped
    ports:
      # host:contenedor — el acceso (LAN y Tailscale serve) usa 3300
      - "3300:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/album_fotos?schema=public
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # CRÍTICO: Montar carpetas de imágenes para NO perder datos
      - ./public/uploads:/app/public/uploads
      - ./public/thumbnails:/app/public/thumbnails
      - ./data:/app/data
    networks:
      - album-network

networks:
  album-network:
    driver: bridge

volumes:
  # Volumen nombrado que persiste los datos de PostgreSQL
  postgres_data:
    driver: local
